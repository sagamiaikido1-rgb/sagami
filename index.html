/* カレンダー */
.cal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.cal-header h2 { font-size: 20px; }
.cal-nav { display: flex; gap: 8px; }
.cal-nav button {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 8px;
  padding: 6px 14px;
  cursor: pointer;
  font-size: 16px;
}
.dojo-filter {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}
.dojo-chip {
  border: none;
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  opacity: 0.5;
  transition: opacity 0.2s;
}
.dojo-chip.active { opacity: 1; }
.dojo-chip.all { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.dojo-chip.chigasaki { background: var(--chigasaki); color: #fff; }
.dojo-chip.hiratsuka { background: var(--hiratsuka); color: #fff; }
.dojo-chip.samukawa { background: var(--samukawa); color: #fff; }
.dojo-chip.fujisawa { background: var(--fujisawa); color: #fff; }
.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 2px;
  background: var(--border);
  border-radius: 12px;
  overflow: hidden;
}
.cal-day-header {
  background: var(--surface2);
  text-align: center;
  padding: 8px 4px;
  font-size: 11px;
  color: var(--text2);
  font-weight: 700;
}
.cal-day-header:first-child { color: #ff6b6b; }
.cal-day-header:last-child { color: #74b9ff; }
.cal-cell {
  background: var(--surface);
  min-height: 72px;
  padding: 4px;
  font-size: 11px;
  vertical-align: top;
}
.cal-cell.other-month .cal-date { color: var(--border); }
.cal-cell.today { background: #1a2340; }
.cal-date {
  font-size: 12px;
  font-weight: 700;
  margin-bottom: 3px;
  color: var(--text2);
  text-align: right;
}
.cal-cell.today .cal-date {
  background: var(--accent);
  color: #000;
  border-radius: 50%;
  width: 22px;
  height: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-left: auto;
}
.cal-event {
  border-radius: 4px;
  padding: 2px 4px;
  font-size: 10px;
  margin-bottom: 2px;
  line-height: 1.3;
  cursor: pointer;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
}
.cal-event.chigasaki { background: var(--chigasaki); color: #fff; }
.cal-event.hiratsuka { background: var(--hiratsuka); color: #fff; }
.cal-event.samukawa { background: var(--samukawa); color: #fff; }
.cal-event.fujisawa { background: var(--fujisawa); color: #fff; }

/* 月次生成 */
.section-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 16px;
}
.section-card h3 {
  font-size: 14px;
  color: var(--text2);
  margin-bottom: 16px;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.schedule-item {
  display: flex;

}
.schedule-item:last-child { border-bottom: none; }

.schedule-info .title { font-size: 14px; font-weight: 600; }

.event-list-item {

#deleteSelectedBtn {

}
#selectAllBtn {

/* 個別追加 */
.form-grid { display: grid; gap: 12px; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-group label { font-size: 12px; color: var(--text2); font-weight: 600; }
.form-group input, .form-group select, .form-group textarea {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);

.dojo-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
.dojo-tab {
  border: 2px solid transparent;
  border-radius: 8px;
  padding: 8px 14px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  opacity: 0.6;
  transition: all 0.2s;
}
.dojo-tab.active { opacity: 1; border-color: rgba(255,255,255,0.5); }
.dojo-tab.chigasaki { background: var(--chigasaki); color: #fff; }
.dojo-tab.hiratsuka { background: var(--hiratsuka); color: #fff; }
.dojo-tab.samukawa { background: var(--samukawa); color: #fff; }
.dojo-tab.fujisawa { background: var(--fujisawa); color: #fff; }

/* Toast */
#toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: #1e293b;
  color: #fff;
  padding: 12px 20px;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 600;
  z-index: 999;
  transition: transform 0.3s ease;
  border: 1px solid var(--border);
}
#toast.show { transform: translateX(-50%) translateY(0); }

.login-notice {
  text-align: center;
  padding: 40px 20px;
  color: var(--text2);
}
.login-notice p { margin-bottom: 16px; font-size: 15px; }

@media (max-width: 600px) {
  .cal-cell { min-height: 52px; }
  .cal-event { display: none; }
  .cal-cell.has-event::after {
    content: '●';
    font-size: 8px;
    display: block;
    text-align: center;
    color: var(--accent);
  }
}

  window.onload = function() {
    const today = new Date();
    const m = String(today.getMonth() + 1).padStart(2, '0');
    document.getElementById('bulkMonth').value = `${today.getFullYear()}-${m}`;
    const ds = String(today.getDate()).padStart(2, '0');
    document.getElementById('addDate').value = `${today.getFullYear()}-${m}-${ds}`;

    gapi.load('client', initGapiClient);

  function initGapiClient() {
    gapi.client.init({ apiKey: API_KEY, discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest'] })
      .then(() => {
        tokenClient = google.accounts.oauth2.initTokenClient({
          client_id: CLIENT_ID,
          scope: SCOPES,
          callback: (resp) => {
            if (resp.error) { showToast('認証エラー: ' + resp.error); return; }
            isSignedIn = true;
            updateAuthBtn();
            loadEvents();
          }
        });
        renderCalendar();
      });
  }

  function handleAuth() {
    if (!isSignedIn) {
      tokenClient.requestAccessToken({ prompt: 'consent' });
    } else {
      google.accounts.oauth2.revoke(gapi.client.getToken().access_token, () => {
        gapi.client.setToken('');
        isSignedIn = false;
        allEvents = [];
        updateAuthBtn();
        renderCalendar();
        document.getElementById('eventList').innerHTML = '<div class="login-notice"><p>ログインすると予定が表示されます</p></div>';
        showToast('ログアウトしました');
      });
    }
  }

  function updateAuthBtn() {
    const btn = document.getElementById('authBtn');
    if (isSignedIn) {
      btn.textContent = '✅ ログイン中';
      btn.className = 'signed-in';
    } else {
      btn.textContent = '🔑 ログイン';
      btn.className = '';
    }
  }

  // ===== タブ =====
  function showTab(tab) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    const idx = ['cal','bulk','list','add'].indexOf(tab);
    document.querySelectorAll('nav button')[idx].classList.add('active');
    if (tab === 'list') renderEventList();
    if (tab === 'cal') renderCalendar();
  }

      h.className = 'cal-day-header';
      h.textContent = d;
      grid.appendChild(h);
    });

    const year = currentYear, month = currentMonth;
    document.getElementById('calTitle').textContent = `${year}年${month + 1}月`;

    const first = new Date(year, month, 1).getDay();
    const last = new Date(year, month + 1, 0).getDate();
    const today = new Date();

    for (let i = 0; i < first; i++) {
      const prevLast = new Date(year, month, 0).getDate();
      const cell = makeCell(prevLast - first + 1 + i, year, month - 1);
      cell.classList.add('other-month');
      grid.appendChild(cell);
    }
    for (let d = 1; d <= last; d++) {
      const cell = makeCell(d, year, month);
      if (d === today.getDate() && month === today.getMonth() && year === today.getFullYear())
        cell.classList.add('today');
      grid.appendChild(cell);
    }
    const remaining = 42 - first - last;
    for (let i = 1; i <= remaining; i++) {
      const cell = makeCell(i, year, month + 1);
      cell.classList.add('other-month');
      grid.appendChild(cell);
    }
  }

  function makeCell(day, year, month) {
    const cell = document.createElement('div');
    cell.className = 'cal-cell';
    const dateDiv = document.createElement('div');
    dateDiv.className = 'cal-date';
    dateDiv.textContent = day;
    cell.appendChild(dateDiv);

    const dateStr = `${year}-${String(month + 1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const dayEvents = allEvents.filter(e => {
      const start = e.start.dateTime || e.start.date;
      return start && start.startsWith(dateStr);
    });

    dayEvents.forEach(ev => {
      if (activeFilter !== 'all') {
        const title = ev.summary || '';
        const dojoName = Object.keys(DOJO_CLASS).find(d => title.includes(d));
        if (!dojoName || dojoName !== activeFilter) return;
      }
      const title = ev.summary || '';
      const dojoName = Object.keys(DOJO_CLASS).find(d => title.includes(d));
      const cls = DOJO_CLASS[dojoName] || 'chigasaki';
      const evDiv = document.createElement('div');
      evDiv.className = `cal-event ${cls}`;
      const t = ev.start.dateTime ? ev.start.dateTime.substr(11,5) : '';
      evDiv.textContent = (t ? t + ' ' : '') + title.replace(/道場|　/g,'').substring(0,8);
      cell.appendChild(evDiv);
      cell.classList.add('has-event');
    });
    return cell;
  }

  function prevMonth() {
    currentMonth--;
    if (currentMonth < 0) { currentMonth = 11; currentYear--; }
    renderCalendar();
  }
  function nextMonth() {
    currentMonth++;
    if (currentMonth > 11) { currentMonth = 0; currentYear++; }
    renderCalendar();
  }

  function filterDojo(dojo, btn) {
    activeFilter = dojo;
    document.querySelectorAll('.dojo-filter .dojo-chip').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderCalendar();
  }

  // ===== イベント取得 =====
  async function loadEvents() {
    try {
      const now = new Date();
      const min = new Date(now.getFullYear(), now.getMonth() - 1, 1).toISOString();
      const max = new Date(now.getFullYear(), now.getMonth() + 3, 0).toISOString();
      const resp = await gapi.client.calendar.events.list({
        calendarId: CALENDAR_ID,
        timeMin: min,
        timeMax: max,
        maxResults: 500,
        singleEvents: true,
        orderBy: 'startTime'
      });
      allEvents = resp.result.items || [];
      renderCalendar();
      renderEventList();
      showToast(`✅ ${allEvents.length}件の予定を読み込みました`);
    } catch(e) {
      showToast('予定の読み込みに失敗しました');
    }
  }

  // ===== 一覧・削除 =====
  function renderEventList() {
    const container = document.getElementById('eventList');
    if (!isSignedIn) {
      container.innerHTML = '<div class="login-notice"><p>ログインすると予定が表示されます</p></div>';
      return;
    }
    const now = new Date().toISOString();
    let events = allEvents.filter(e => {
      const start = e.start.dateTime || e.start.date;
      return start >= now.substr(0,10);
    });
    if (listFilter !== 'all') {
      events = events.filter(e => (e.summary || '').includes(listFilter));
    }
    if (events.length === 0) {
      container.innerHTML = '<div class="login-notice"><p>予定がありません</p></div>';
      return;
    }
    container.innerHTML = events.map(ev => {
      const title = ev.summary || '(無題)';
      const dojoName = Object.keys(DOJO_CLASS).find(d => title.includes(d));
      const cls = DOJO_CLASS[dojoName] || 'chigasaki';
      const start = ev.start.dateTime || ev.start.date;
      const dateStr = start ? start.substr(0,10) : '';
      const timeStr = ev.start.dateTime ? ev.start.dateTime.substr(11,5) : '終日';
      return `<div class="event-list-item" id="item-${ev.id}">
        <input type="checkbox" data-id="${ev.id}">
        <span class="dojo-chip ${cls}" style="flex-shrink:0">${dojoName || ''}</span>
        <div class="event-list-info">
          <div class="etitle">${title}</div>
          <div class="etime">${dateStr} ${timeStr}</div>
        </div>
        <button class="btn-danger" onclick="deleteSingle('${ev.id}')">削除</button>
      </div>`;
    }).join('');
  }

  function filterListDojo(dojo, btn) {
    listFilter = dojo;
    document.querySelectorAll('#tab-list .dojo-filter .dojo-chip').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderEventList();
  }

  function toggleSelectAll() {
    const boxes = document.querySelectorAll('#eventList input[type=checkbox]');
    const allChecked = Array.from(boxes).every(b => b.checked);
    boxes.forEach(b => b.checked = !allChecked);
  }

  async function deleteSelected() {
    const ids = Array.from(document.querySelectorAll('#eventList input[type=checkbox]:checked')).map(b => b.dataset.id);
    if (ids.length === 0) { showToast('削除する予定を選択してください'); return; }
    if (!confirm(`${ids.length}件を削除しますか？`)) return;
    let count = 0;
    for (const id of ids) {
      try {
        await gapi.client.calendar.events.delete({ calendarId: CALENDAR_ID, eventId: id });
        allEvents = allEvents.filter(e => e.id !== id);
        count++;
      } catch(e) {}
    }
    renderEventList();
    renderCalendar();
    showToast(`🗑 ${count}件を削除しました`);
  }

  async function deleteSingle(id) {
    if (!confirm('この予定を削除しますか？')) return;
    try {
      await gapi.client.calendar.events.delete({ calendarId: CALENDAR_ID, eventId: id });
      allEvents = allEvents.filter(e => e.id !== id);
      renderEventList();
      renderCalendar();
      showToast('🗑 削除しました');
    } catch(e) {
      showToast('削除に失敗しました');
    }
  }

  // ===== 月次生成 =====
  function previewBulk() {
    const monthVal = document.getElementById('bulkMonth').value;
    if (!monthVal) { showToast('年月を選択してください'); return; }
    const [year, month] = monthVal.split('-').map(Number);
    const lastDay = new Date(year, month, 0).getDate();
    bulkPreviewEvents = [];
    for (let d = 1; d <= lastDay; d++) {
      const date = new Date(year, month - 1, d);
      const dow = date.getDay();
      REGULAR_SCHEDULES.forEach(s => {
        if (s.day === dow) {
          const ds = `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
          bulkPreviewEvents.push({ dojo: s.dojo, title: s.title, date: ds, start: s.start, end: s.end });
        }
      });
    }
    bulkPreviewEvents.sort((a,b) => a.date.localeCompare(b.date));
    const container = document.getElementById('previewItems');
    container.innerHTML = bulkPreviewEvents.map(e =>
      `<div class="preview-item"><span class="dojo-chip ${DOJO_CLASS[e.dojo]}" style="font-size:11px">${e.dojo}</span> ${e.date} ${e.start}〜${e.end} ${e.title}</div>`
    ).join('');
    document.getElementById('previewList').style.display = 'block';
  }

  async function executeBulk() {
    if (!isSignedIn) { showToast('先にログインしてください'); return; }
    if (bulkPreviewEvents.length === 0) return;
    let count = 0;
    for (const ev of bulkPreviewEvents) {
      try {
        await gapi.client.calendar.events.insert({
          calendarId: CALENDAR_ID,
          resource: {
            summary: ev.title,
            start: { dateTime: `${ev.date}T${ev.start}:00+09:00` },
            end:   { dateTime: `${ev.date}T${ev.end}:00+09:00` }
          }
        });
        count++;
      } catch(e) {}
    }
    await loadEvents();
    cancelPreview();
    showToast(`✅ ${count}件を登録しました`);
  }

  function cancelPreview() {
    document.getElementById('previewList').style.display = 'none';
    bulkPreviewEvents = [];
  }

  // ===== 個別追加 =====
  function selectDojo(dojo, btn) {
    selectedDojo = dojo;
    document.querySelectorAll('.dojo-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('addDojoTitle').textContent = `${dojo}道場　個別追加`;
    // デフォルト時刻
    const defaults = { '茅ヶ崎': ['09:30','11:30'], '平塚': ['15:30','17:30'], '寒川': ['12:30','14:30'], '藤沢': ['09:30','11:30'] };
    if (defaults[dojo]) {
      document.getElementById('addStart').value = defaults[dojo][0];
      document.getElementById('addEnd').value = defaults[dojo][1];
    }
  }

  async function addEvent() {
    if (!isSignedIn) { showToast('先にログインしてください'); return; }
    const date = document.getElementById('addDate').value;
    const type = document.getElementById('addType').value;
    const start = document.getElementById('addStart').value;
    const end = document.getElementById('addEnd').value;
    const memo = document.getElementById('addMemo').value;
    if (!date || !start || !end) { showToast('日付・時刻を入力してください'); return; }
    const title = `${selectedDojo}道場　${type}`;
    try {
      await gapi.client.calendar.events.insert({
        calendarId: CALENDAR_ID,
        resource: {
          summary: title,
          description: memo,
          start: { dateTime: `${date}T${start}:00+09:00` },
          end:   { dateTime: `${date}T${end}:00+09:00` }
        }
      });
      await loadEvents();
      clearAddForm();
      showToast(`✅ 追加しました：${title}`);
    } catch(e) {
      showToast('追加に失敗しました');
    }
  }

  function clearAddForm() {
    document.getElementById('addMemo').value = '';
  }

  // ===== Toast =====
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }
</script>
